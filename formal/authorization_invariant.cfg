\* TLC configuration for authorization_invariant.
\* Bounded model check: 2-element boolean space per variable = 2^5 = 32
\* base states. The four authorization gates (identityActive, policyAllows,
\* capabilityAllows, handlerRegistered) each take TRUE or FALSE, so TLC
\* explores all 16 input combinations; the executed variable adds another
\* 2x factor for a total of 32 states + transitions.
\*
\* Asserts:
\*   - TypeOK (INVARIANT, type correctness)
\*   - NoUnauthorizedExecution (INVARIANT, safety: handler never runs
\*     unless all four authorization gates are TRUE)
\*
\* Deadlock checking is enabled: with finite transitions defined, a
\* deadlock is the correct liveness signal (the model is closed under
\* Next; if Next is enabled the model progresses; if no transition
\* matches, TLC reports a deadlock).

INIT Init
NEXT Next

INVARIANT TypeOK
INVARIANT NoUnauthorizedExecution

CHECK_DEADLOCK TRUE
