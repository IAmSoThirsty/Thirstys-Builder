# GitHub Actions CI for the Constitutional Builder / ThirstyAi Builder
# monorepo. Runs the full local verification gate on every push to main
# and on every pull request targeting main.
#
# The gate is `python scripts/verify_all.py` from the repo root. It
# runs unit tests, formal model checks, property-based fuzz, audit
# chain verification, benchmarks, conformance, chaos, deployment
# validation, and release-evidence freshness.
#
# The Ollama-dependent tests skip gracefully when Ollama is not
# available; CI does not install Ollama (it is a 5GB+ model download).
# A separate workflow could spin up Ollama on a self-hosted runner if
# we want to run the live round-trip in CI; that is out of scope here.

name: gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same branch when a new commit lands.
concurrency:
  group: gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: verify_all.py
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install CBEP deps
        run: |
          python -m pip install --upgrade pip
          pip install "grpcio>=1.81.1,<2" "protobuf>=6.33.5,<7"

      - name: Install ThirstyAi Builder deps
        working-directory: thirsty-ai-builder/backend
        run: pip install -r requirements.txt

      - name: Install Rust toolchain (for rust-auditor build)
        uses: dtolnay/rust-toolchain@stable

      - name: Build rust-auditor
        working-directory: thirsty-ai-builder/rust-auditor
        run: cargo build --release

      - name: Run the full gate
        env:
          # Tell the test suite to require Ollama. If Ollama is not
          # available, the OllamaLive tests skip; with this off the
          # gate still passes. Flip to 1 to require it on this runner.
          THIRSTY_AI_REQUIRE_OLLAMA: "0"
          CB_API_KEY: ci-token-do-not-use-in-prod
        run: python scripts/verify_all.py

      - name: Upload release artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            release/sbom.json
            release/provenance.json
            release/provenance.signature.json
            release/package-manifest.json
            release/package-signature.json
            release/constitutional-builder-0.1.0.zip
          retention-days: 30
