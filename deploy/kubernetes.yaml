apiVersion: v1
kind: ConfigMap
metadata:
  name: constitutional-builder-config
data:
  example-config.json: |
    {
      "subjects": [{"subject_id": "operator", "display_name": "Demo Operator", "roles": ["operator"], "active": true}],
      "policies": [{"policy_id": "policy-allow-operator-echo", "effect": "allow", "subject_id": "operator", "operation": "echo", "resource": "demo"}],
      "capabilities": [{"grant_id": "grant-operator-echo", "subject_id": "operator", "operation": "echo", "resource": "demo"}]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: constitutional-builder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: constitutional-builder
  template:
    metadata:
      labels:
        app: constitutional-builder
    spec:
      containers:
        - name: api
          image: constitutional-builder:0.3.1
          command: ["constitutional-builder-api"]
          args: ["--config", "/config/example-config.json", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          configMap:
            name: constitutional-builder-config
---
apiVersion: v1
kind: Service
metadata:
  name: constitutional-builder
spec:
  selector:
    app: constitutional-builder
  ports:
    - port: 8080
      targetPort: 8080
