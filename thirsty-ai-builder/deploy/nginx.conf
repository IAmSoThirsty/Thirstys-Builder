# nginx config for the ThirstyAI Builder.
#
# For environments where Caddy is not available, this nginx config
# terminates TLS in front of the FastAPI backend. You'll need a
# certificate (Let's Encrypt via `certbot`, or your organization's CA).
# Place this file at /etc/nginx/sites-available/thirsty-ai-builder
# and symlink it into sites-enabled.
#
# Pre-requisites (Ubuntu 22.04+):
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo certbot --nginx -d DOMAIN.example.com -d www.DOMAIN.example.com
#   sudo systemctl reload nginx
#
# The backend listens on 127.0.0.1:8001 over plain HTTP. nginx terminates
# TLS on :443 and forwards to the loopback backend.

# Upstream definition so the backend is reachable by name.
upstream thirsty_ai_backend {
    server 127.0.0.1:8001 fail_timeout=0;
    keepalive 32;
}

# HTTP -> HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN.example.com www.DOMAIN.example.com;
    return 301 https://$host$request_uri;
}

# HTTPS server block.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DOMAIN.example.com www.DOMAIN.example.com;

    # Certificate paths are written by certbot. If you use a custom CA,
    # point ssl_certificate and ssl_certificate_key at the right files.
    ssl_certificate     /etc/letsencrypt/live/DOMAIN.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS + security headers.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # Body size: 16MB ceiling for the largest of the requests the
    # backend accepts (e.g. paper ingest). Adjust if you raise the cap
    # in server.py.
    client_max_body_size 16m;

    # Long-running endpoints: 5 minute timeout.
    location ~ ^/api/(dove|holli|marketing|rag|commander) {
        proxy_pass http://thirsty_ai_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Default location: everything else forwards with a normal timeout.
    location / {
        proxy_pass http://thirsty_ai_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }
}
