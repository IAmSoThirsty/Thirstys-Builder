version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: thirsty_ai_builder
      CORS_ORIGINS: "*"
      # On macOS/Windows Docker Desktop, the host's Ollama server is
      # reachable at host.docker.internal. On Linux, replace with the
      # host's IP (e.g. 172.17.0.1) or run Ollama in its own service.
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen2.5-coder:7b
      PORT: "8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8001"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_BACKEND_URL: http://localhost:8001
    ports:
      - "3000:3000"

volumes:
  mongo_data:
