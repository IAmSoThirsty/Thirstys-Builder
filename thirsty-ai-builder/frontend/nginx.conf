# Frontend nginx config.
#
# Two location blocks:
#   /          -> SPA static files; everything falls back to /index.html
#                 for client-side routing.
#   /api/      -> proxied to the backend service.
#
# The frontend and backend are reached on the same origin (no CORS).
# The backend enforces its own auth (Bearer token) and security
# headers. Nginx here is the TLS-termination and origin-merge layer.
#
# Reviewer checklist: every security header is set; the API proxy
# does not allow any method beyond GET/POST (matches the backend's
# CORSMiddleware allow_methods); SPA fallback is configured.

upstream backend {
    server backend:8001;
}

# Security headers — applied to every response.
# (CSP, HSTS, X-Frame-Options, etc. The backend sets the same set on
# /api/* responses; we re-apply here for the static SPA HTML.)
map $sent_http_content_type $csp_default_src {
    default "'self'";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ---- security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    # HSTS only when behind HTTPS. We serve plain HTTP inside the
    # compose network; an upstream proxy (Caddy, cloud LB) terminates
    # TLS and adds the HSTS header on the way out.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # ---- body size cap ----
    client_max_body_size 2m;

    # ---- /api/* proxy ----
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long-running chat / marketing / RAG / commander endpoints.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }

    # ---- SPA fallback ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- health endpoint ----
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
